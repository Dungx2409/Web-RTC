name: CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2. Login DockerHub
      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build backend image
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./server

      # 4. Push backend image
      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

      # 5. Build frontend image
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./frontend

      # 6. Push frontend image
      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

      # 7. Update deployment.yaml (GitOps)
      - name: Update image tag
        run: |
          sed -i "s|image: .*/backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|image: .*/frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      # 8. Commit lại file YAML
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update image tag ${{ github.sha }}" || echo "No changes"
          git push
