apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dungx2409/frontend:1128cbd7c3c62e02e70a88c420029bd072d9a4c6
          ports:
            - containerPort: 3000